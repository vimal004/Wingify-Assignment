services:
  # FastAPI Web Service
  - type: web
    name: financial-analyzer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0

  # Celery Worker
  - type: worker
    name: financial-analyzer-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
